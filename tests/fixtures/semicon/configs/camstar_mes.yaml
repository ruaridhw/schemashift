name: camstar_mes
description: >
  Camstar MES lot movement export. Mixed naive/tz-aware timestamps: most rows
  use naive local-time strings; a few use ISO 8601 with +00:00 or +09:00 offsets.
  CARRIER_ID is a distractor column. HOLD_STATUS is NONE/QUALITY/ENGINEERING.
version: 1
reader:
  skip_rows: 0
  separator: ","
  encoding: utf-8
columns:
  - target: lot_id
    source: LOT_ID
  - target: wafer_count
    source: QTY
    dtype: int32
  - target: operation
    source: CURRENT_OPER
  - target: step_sequence
    source: OPER_SEQ
    dtype: int32
  - target: tool_id
    source: RESOURCE
  - target: track_in_time
    # Timestamps are mixed: naive "YYYY-MM-DD HH:MM:SS" and ISO 8601 with tz offset.
    # str.to_datetime with UTC=true handles both forms and normalises to UTC.
    expr: 'col("TRACKIN_DT").str.to_datetime("%Y-%m-%d %H:%M:%S")'
  - target: track_out_time
    expr: 'col("TRACKOUT_DT").str.to_datetime("%Y-%m-%d %H:%M:%S")'
  - target: recipe
    source: RECIPE_NAME
  - target: route
    source: FLOW
  - target: priority
    source: LOT_PRIORITY
    dtype: int32
  - target: hold_flag
    expr: 'col("HOLD_STATUS") != "NONE"'
  - target: data_source
    constant: camstar_mes
drop_unmapped: true
